# Infra CD — runs when a PR is merged into main (push event).
# Sequential promotion: dev → test → perf → staging (approval) → production (approval)
#
# Required repository secrets:
#   AWS_ROLE_ARN  — IAM role ARN for OIDC federation (read-write apply permissions)
#
# Required GitHub Environments (Settings → Environments):
#   dev, test, perf   — no protection rules (auto-deploy)
#   staging           — Required reviewers: 1+, Restrict to: main branch
#   production        — Required reviewers: 1+, Restrict to: main branch

name: Infra CD

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-cd.yml'

env:
  TF_VERSION: '1.10.0'
  AWS_REGION: 'us-east-1'
  CONFTEST_VERSION: '0.68.2'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write   # OIDC → AWS

# Prevent two deployments from running at the same time.
# cancel-in-progress: false means a second push queues instead of killing
# an in-flight deployment (safer for infrastructure changes).
concurrency:
  group: infra-deploy
  cancel-in-progress: false

# ─── Reusable apply logic (called per environment) ───────────────────────────
# GitHub Actions does not support reusable steps inline, so each job repeats
# the core steps. A composite action can DRY this up in a follow-on task.

jobs:
  # ─── dev (auto) ──────────────────────────────────────────────────────────────
  apply-dev:
    name: Apply / dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Conftest
        run: |
          curl -sL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/conftest

      - name: OPA — pre-apply approval check
        run: |
          cat > deployment-metadata.json <<EOF
          {
            "environment":  "dev",
            "github_ref":   "${{ github.ref }}",
            "github_actor": "${{ github.actor }}",
            "event":        "${{ github.event_name }}"
          }
          EOF
          conftest test deployment-metadata.json \
            --policy policies/terraform/ \
            --namespace terraform.approval

      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: infra/envs/dev
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false \
            -lock-timeout=300s

  # ─── test (auto, after dev) ───────────────────────────────────────────────────
  apply-test:
    name: Apply / test
    runs-on: ubuntu-latest
    needs: apply-dev
    if: ${{ false }}
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Conftest
        run: |
          curl -sL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/conftest
      - name: OPA — pre-apply approval check
        run: |
          cat > deployment-metadata.json <<EOF
          {
            "environment":  "test",
            "github_ref":   "${{ github.ref }}",
            "github_actor": "${{ github.actor }}",
            "event":        "${{ github.event_name }}"
          }
          EOF
          conftest test deployment-metadata.json \
            --policy policies/terraform/ \
            --namespace terraform.approval
      - name: Terraform Init
        working-directory: infra/envs/test
        run: terraform init -input=false
      - name: Terraform Apply
        working-directory: infra/envs/test
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false \
            -lock-timeout=300s

  # ─── perf (auto, after test) ──────────────────────────────────────────────────
  apply-perf:
    name: Apply / perf
    runs-on: ubuntu-latest
    needs: apply-test
    if: ${{ false }}
    environment: perf
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Conftest
        run: |
          curl -sL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/conftest
      - name: OPA — pre-apply approval check
        run: |
          cat > deployment-metadata.json <<EOF
          {
            "environment":  "perf",
            "github_ref":   "${{ github.ref }}",
            "github_actor": "${{ github.actor }}",
            "event":        "${{ github.event_name }}"
          }
          EOF
          conftest test deployment-metadata.json \
            --policy policies/terraform/ \
            --namespace terraform.approval
      - name: Terraform Init
        working-directory: infra/envs/perf
        run: terraform init -input=false
      - name: Terraform Apply
        working-directory: infra/envs/perf
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false \
            -lock-timeout=300s

  # ─── staging (manual approval gate) ──────────────────────────────────────────
  apply-staging:
    name: Apply / staging
    runs-on: ubuntu-latest
    needs: apply-perf
    if: ${{ false }}
    # GitHub pauses this job and waits for a reviewer to approve
    # before the runner is even provisioned.
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Conftest
        run: |
          curl -sL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/conftest
      - name: OPA — pre-apply approval check (protected env)
        run: |
          cat > deployment-metadata.json <<EOF
          {
            "environment":  "staging",
            "github_ref":   "${{ github.ref }}",
            "github_actor": "${{ github.actor }}",
            "event":        "${{ github.event_name }}"
          }
          EOF
          conftest test deployment-metadata.json \
            --policy policies/terraform/ \
            --namespace terraform.approval
      - name: Terraform Init
        working-directory: infra/envs/staging
        run: terraform init -input=false
      - name: Terraform Plan (pre-apply confirmation)
        working-directory: infra/envs/staging
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan.binary \
            -input=false \
            -lock-timeout=300s \
            -no-color
          terraform show -json tfplan.binary > tfplan.json
      - name: OPA — security baseline (plan JSON)
        working-directory: infra/envs/staging
        run: |
          conftest test tfplan.json \
            --policy ../../../policies/terraform/ \
            --namespace terraform.secrets
          conftest test tfplan.json \
            --policy ../../../policies/terraform/ \
            --namespace terraform.security_baseline
      - name: Terraform Apply
        working-directory: infra/envs/staging
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false \
            -lock-timeout=300s

  # ─── production (manual approval gate) ───────────────────────────────────────
  apply-production:
    name: Apply / production
    runs-on: ubuntu-latest
    needs: apply-staging
    if: ${{ false }}
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Install Conftest
        run: |
          curl -sL \
            "https://github.com/open-policy-agent/conftest/releases/download/v${{ env.CONFTEST_VERSION }}/conftest_${{ env.CONFTEST_VERSION }}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/conftest
      - name: OPA — pre-apply approval check (protected env)
        run: |
          cat > deployment-metadata.json <<EOF
          {
            "environment":  "production",
            "github_ref":   "${{ github.ref }}",
            "github_actor": "${{ github.actor }}",
            "event":        "${{ github.event_name }}"
          }
          EOF
          conftest test deployment-metadata.json \
            --policy policies/terraform/ \
            --namespace terraform.approval
      - name: Terraform Init
        working-directory: infra/envs/production
        run: terraform init -input=false
      - name: Terraform Plan (pre-apply confirmation)
        working-directory: infra/envs/production
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan.binary \
            -input=false \
            -lock-timeout=300s \
            -no-color
          terraform show -json tfplan.binary > tfplan.json
      - name: OPA — security baseline (plan JSON)
        working-directory: infra/envs/production
        run: |
          conftest test tfplan.json \
            --policy ../../../policies/terraform/ \
            --namespace terraform.secrets
          conftest test tfplan.json \
            --policy ../../../policies/terraform/ \
            --namespace terraform.security_baseline
      - name: Terraform Apply
        working-directory: infra/envs/production
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -auto-approve \
            -input=false \
            -lock-timeout=300s
# Infra CD — triggered on merge to main (infra/ changes) or manual dispatch.
# Flow per environment:
#   plan → (approval gate for perf/staging/production) → apply
#
# Environment protection rules (configure in GitHub repo Settings):
#   dev    → auto-approve
#   test   → auto-approve
#   perf   → requires 1 reviewer approval
#   staging   → requires 1 reviewer approval
#   production → requires 2 reviewer approvals

