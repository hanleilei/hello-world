# Service CD — runs only after code lands on main.
#
# Release policy:
#   1. Build and test the Chalice application package.
#   2. Terraform release gate reads enable_lambda from terraform.tfvars.
#   3. If enabled for dev, run "terraform apply" passing the deployment zip.
#   4. Terraform's null_resource calls "aws lambda update-function-code" so
#      the pipeline never creates AWS resources directly — only Terraform does.
#
# Branch protection note:
#   Enforcing "main only changes through PRs" must be configured in GitHub
#   branch protection settings. Workflow files cannot fully enforce that alone.

name: Service CD

on:
  # Called by release.yml after service-ci succeeds, ensuring CI always gates CD.
  workflow_call:

env:
  AWS_REGION: 'us-east-1'
  AWS_DEFAULT_REGION: 'us-east-1'
  PYTHON_VERSION: '3.12'
  TF_VERSION: '1.10.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: service-cd
  cancel-in-progress: false

jobs:
  # ─── Stage 1: Test & package ──────────────────────────────────────────────────
  test-and-package:
    name: Test & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build Chalice artifact
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: chalice --project-dir src package --stage dev /tmp/chalice-pkg

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-package-dev
          path: /tmp/chalice-pkg
          retention-days: 7

  # ─── Stage 2: Terraform release gate ─────────────────────────────────────────
  terraform-release-gate:
    name: Terraform Release Gate
    runs-on: ubuntu-latest
    needs: test-and-package
    outputs:
      dev_enabled: ${{ steps.flags.outputs.dev_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform feature flags
        id: flags
        shell: bash
        run: |
          # Read a boolean flag from a tfvars file.
          # Usage: read_flag <file> <flag_name>
          read_flag() {
            local file="$1" flag="$2"
            local value
            value=$(awk -F= -v flag="$flag" \
              '$0 ~ "^[[:space:]]*" flag "[[:space:]]*=" {gsub(/[[:space:]]/, "", $2); print tolower($2); exit}' "$file")
            echo "${value:-false}"
          }

          DEV_LAMBDA=$(read_flag infra/envs/dev/terraform.tfvars enable_lambda)
          DEV_ECR=$(read_flag infra/envs/dev/terraform.tfvars enable_ecr)
          # Non-dev release pipelines are intentionally disabled.
          echo "dev_enabled=$DEV_LAMBDA" >> "$GITHUB_OUTPUT"
          echo "ecr_enabled=$DEV_ECR"    >> "$GITHUB_OUTPUT"

      - name: Print gate summary
        run: |
          echo "dev lambda: ${{ steps.flags.outputs.dev_enabled }}"
          echo "dev ecr:    ${{ steps.flags.outputs.ecr_enabled }}"
          echo "test/perf/staging/production: false (intentionally disabled)"

  # ─── Stage 3a: Build & push Docker image to ECR ──────────────────────────────
  build-and-push-ecr:
    name: Build & Push — ECR (dev)
    runs-on: ubuntu-latest
    needs: terraform-release-gate
    if: ${{ needs.terraform-release-gate.outputs.ecr_enabled == 'true' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: hello-world
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

  # ─── Stage 3b: Deploy Lambda to dev ──────────────────────────────────────────
  deploy-dev:
    name: Deploy — dev
    runs-on: ubuntu-latest
    needs: terraform-release-gate
    if: ${{ needs.terraform-release-gate.outputs.dev_enabled == 'true' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: service-package-dev
          path: /tmp/chalice-pkg

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_CD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -input=false

      - name: Terraform Apply — deploy Lambda code
        working-directory: infra/envs/dev
        run: |
          terraform apply \
            -var-file=terraform.tfvars \
            -var "deployment_package_path=/tmp/chalice-pkg/deployment.zip" \
            -auto-approve \
            -input=false \
            -lock-timeout=300s

      - name: Get API endpoint
        id: tf_output
        working-directory: infra/envs/dev
        run: |
          endpoint=$(terraform output -raw api_endpoint_url)
          echo "endpoint=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Wait for Lambda to finish updating
        run: |
          aws lambda wait function-updated \
            --function-name hello-world-dev \
            --region ${{ env.AWS_REGION }}
          echo "Lambda is Active and ready."

      - name: Smoke test — deployed Lambda
        run: |
          set -euo pipefail
          BASE="${{ steps.tf_output.outputs.endpoint }}"
          echo "Testing $BASE/health ..."
          resp=$(curl -s --fail-with-body --retry 5 --retry-delay 5 --retry-all-errors "$BASE/health")
          echo "$resp"
          echo "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'unexpected: {d}'"
          echo "Smoke test passed."

  # ─── Stage 3b: Skip when disabled ────────────────────────────────────────────
  no-deploy-when-disabled:
    name: Skip — Lambda disabled
    runs-on: ubuntu-latest
    needs: terraform-release-gate
    if: ${{ needs.terraform-release-gate.outputs.dev_enabled == 'false' }}
    steps:
      - name: Explain skip
        run: |
          echo "enable_lambda=false in infra/envs/dev/terraform.tfvars."
          echo "No Lambda resources will be deployed."
          echo "Set enable_lambda=true and re-merge to enable deployment."


