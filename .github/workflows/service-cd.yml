# Service CD — runs only after code lands on main.
#
# Release policy:
#   1. GitHub Actions orchestrates the pipeline.
#   2. Terraform decides whether an environment is allowed to host Lambda.
#   3. This workflow must not create service resources directly.
#   4. If Terraform has enable_lambda=false, deployment is skipped.
#
# Branch protection note:
#   Enforcing "main only changes through PRs" must be configured in GitHub
#   branch protection settings. Workflow files cannot fully enforce that alone.

name: Service CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/service-cd.yml'

env:
  AWS_REGION: 'us-east-1'
  AWS_DEFAULT_REGION: 'us-east-1'
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  id-token: write

concurrency:
  group: service-cd
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ --cov=src --cov-fail-under=70 -q

      - name: Build Chalice artifact (no deploy)
        run: chalice --project-dir src package --stage dev /tmp/chalice-pkg

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: service-package-dev
          path: /tmp/chalice-pkg
          retention-days: 7

  terraform-release-gate:
    name: Terraform Release Gate
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      dev_enabled: ${{ steps.flags.outputs.dev_enabled }}
      test_enabled: ${{ steps.flags.outputs.test_enabled }}
      perf_enabled: ${{ steps.flags.outputs.perf_enabled }}
      staging_enabled: ${{ steps.flags.outputs.staging_enabled }}
      production_enabled: ${{ steps.flags.outputs.production_enabled }}
      any_enabled: ${{ steps.flags.outputs.any_enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform feature flags
        id: flags
        shell: bash
        run: |
          read_flag() {
            local file="$1"
            local value
            value=$(awk -F= '/^[[:space:]]*enable_lambda[[:space:]]*=/{gsub(/[[:space:]]/, "", $2); print tolower($2); exit}' "$file")
            if [[ -z "$value" ]]; then
              value="false"
            fi
            echo "$value"
          }

          DEV_ENABLED=$(read_flag infra/envs/dev/terraform.tfvars)
          TEST_ENABLED=$(read_flag infra/envs/test/terraform.tfvars)
          PERF_ENABLED=$(read_flag infra/envs/perf/terraform.tfvars)
          STAGING_ENABLED=$(read_flag infra/envs/staging/terraform.tfvars)
          PRODUCTION_ENABLED=$(read_flag infra/envs/production/terraform.tfvars)

          ANY_ENABLED=false
          for flag in "$DEV_ENABLED" "$TEST_ENABLED" "$PERF_ENABLED" "$STAGING_ENABLED" "$PRODUCTION_ENABLED"; do
            if [[ "$flag" == "true" ]]; then
              ANY_ENABLED=true
              break
            fi
          done

          echo "dev_enabled=$DEV_ENABLED" >> "$GITHUB_OUTPUT"
          echo "test_enabled=$TEST_ENABLED" >> "$GITHUB_OUTPUT"
          echo "perf_enabled=$PERF_ENABLED" >> "$GITHUB_OUTPUT"
          echo "staging_enabled=$STAGING_ENABLED" >> "$GITHUB_OUTPUT"
          echo "production_enabled=$PRODUCTION_ENABLED" >> "$GITHUB_OUTPUT"
          echo "any_enabled=$ANY_ENABLED" >> "$GITHUB_OUTPUT"

      - name: Print gate summary
        run: |
          echo "dev:        ${{ steps.flags.outputs.dev_enabled }}"
          echo "test:       ${{ steps.flags.outputs.test_enabled }}"
          echo "perf:       ${{ steps.flags.outputs.perf_enabled }}"
          echo "staging:    ${{ steps.flags.outputs.staging_enabled }}"
          echo "production: ${{ steps.flags.outputs.production_enabled }}"

  no-deploy-when-disabled:
    name: Skip When Terraform Disables Lambda
    runs-on: ubuntu-latest
    needs: terraform-release-gate
    if: ${{ needs.terraform-release-gate.outputs.any_enabled == 'false' }}
    steps:
      - name: Explain skip
        run: |
          echo "Terraform has enable_lambda=false in all service environments."
          echo "Per release policy, this workflow will not publish any Lambda or API Gateway resources."
          echo "GitHub Actions validated and packaged the app only."

  terraform-managed-deploy-not-implemented:
    name: Block Unsupported Direct Publish
    runs-on: ubuntu-latest
    needs: terraform-release-gate
    if: ${{ needs.terraform-release-gate.outputs.any_enabled == 'true' }}
    steps:
      - name: Stop direct resource creation
        run: |
          echo "Terraform has at least one environment with enable_lambda=true."
          echo "Direct Chalice resource publishing has been intentionally disabled."
          echo "Implement a Terraform-managed service deployment path before enabling release here."
          exit 1


